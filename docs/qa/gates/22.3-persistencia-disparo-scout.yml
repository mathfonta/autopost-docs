nfr_validation:
  security:
    status: PASS
    notes: 'Nenhum segredo em log (token nunca aparece, só client_id/niche/confidence). str(client.id) usado para serializar UUID no argumento da task Celery — evita problema de serialização de UUID cru.'
  performance:
    status: PASS
    notes: 'Task roda em background (Celery), fora do caminho crítico do onboarding. Reusa fetch_recent_media/analyze_profile já revisados nas Stories 22.1/22.2 (limits e sub-amostras já contêm custo).'
  reliability:
    status: PASS
    notes: 'Dupla camada de proteção contra exceção: a função interna (_run_scout_analysis_async) tem try/except em torno das chamadas de fetch/analyze (que, pelos próprios contratos das Stories 22.1/22.2, nunca deveriam lançar — defesa em profundidade legítima), e o wrapper síncrono da task Celery captura qualquer exceção residual (incluindo uuid.UUID(client_id) malformado ou falha de db.execute) e aciona retry — nunca propaga para fora da task nem quebra o worker.'
  maintainability:
    status: PASS
    notes: 'Segue fielmente o molde de renew_meta_tokens e o padrão testável de _increment_attack_sequence. Comentário específico sobre o cuidado com JSONB/MutableDict é um bom sinal de manutenibilidade — evita que um dev futuro reintroduza um bug de mutação in-place.'

