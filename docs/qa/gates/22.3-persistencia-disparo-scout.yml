top_issues:
  - id: 'DES-002'
    severity: low
    finding: 'Quando o cliente não tem conexão Instagram ativa no momento da execução (guarda defensiva além do pedido pelas ACs), scout_status vai de pending direto para skipped, sem passar por running. Mesmo padrão de decisão já revisado e endossado na Story 22.2 (DES-001) — semântica razoável (a análise nunca chegou a começar de fato), mas diverge da leitura mais literal de AC7 ("pending → running no início da task").'
    suggested_action: 'Nenhuma ação necessária — documentar como comportamento intencional, consistente com o DES-001 da 22.2.'
    suggested_owner: po

  - id: 'CONC-001'
    severity: low
    finding: 'Sem proteção contra concorrência: se o mesmo cliente desconectar e reconectar o Instagram rapidamente, duas execuções de run_scout_analysis poderiam rodar em paralelo para o mesmo client_id. O dano prático é baixo (pior caso: scout_insights fica com o resultado de quem commitou por último, não há corrupção nem crash), e não há mecanismo de lock ou deduplicação de task.'
    suggested_action: 'Não bloqueante para o MVP do epic — considerar um lock por client_id (ex: chave única no Redis) se o padrão de reconexão rápida se mostrar comum em produção.'
    suggested_owner: dev

