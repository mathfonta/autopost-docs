bugs_encontrados_fora_do_epic_22:
  descricao: 'Durante o teste manual real desta story, 3 bugs de produção pré-existentes (não relacionados ao Epic 22) foram encontrados e corrigidos com autorização direta do usuário, fora do fluxo formal de stories.'
  itens:
    - 'FRONTEND_URL malformada na configuração do Railway (duas URLs concatenadas com espaço) — causava 404 em todo redirect pós-OAuth. Corrigido pelo usuário no painel do Railway.'
    - 'app/onboarding/page.tsx: checagem de "onboarding já concluído" rodava antes da checagem do retorno do OAuth (?connected=true) — mandava o usuário direto ao /dashboard, tornando a tela StepComplete (e toda a UI do Scout) inalcançável no fluxo real. Commit 5211a31.'
    - 'components/dashboard/SubStrategySelector.tsx: <button> aninhado em <button>, causando erro de hidratação React no dashboard. Commit d5b350f.'
    - 'components/onboarding/StepComplete.tsx: copy desatualizado em "Como funciona" (mencionava WhatsApp/API como via principal, quando o fluxo real hoje é upload direto no app). Commit e2714c2.'
  nota: 'Nenhum desses bugs foi introduzido pelo Epic 22 — mas o item #2 (page.tsx) bloqueava diretamente o valor da Story 22.5, então sua correção foi essencial para a validação real acontecer.'
