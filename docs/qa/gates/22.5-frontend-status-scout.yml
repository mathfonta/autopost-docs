schema: 1
story: '22.5'
story_title: 'Frontend — status "Analisando seu perfil" e sugestão de refino'
gate: PASS
status_reason: 'MANUAL-001 resolvido: usuário validou o fluxo completo em produção (autopost.app.br) com uma conexão Instagram real — não simulada. O card de sugestão do Scout renderizou com dado real (ScoutReport genuíno, gerado pela pipeline de visão+síntese), pontuação correta (COPY-001 confirmado), e os dois botões presentes. UX-001 e COPY-001 já haviam sido corrigidos no review original. Único item remanescente é DOC-002 (severidade baixa, textual, não bloqueante).'
reviewer: 'Quinn (Test Architect)'
updated: '2026-07-24T00:05:00-03:00'

top_issues:
  - id: 'MANUAL-001'
    severity: low
    finding: 'RESOLVIDO — usuário testou o fluxo completo em produção (autopost.app.br) com conexão Instagram real. Resultado: redirect pós-OAuth correto, card de sugestão do Scout renderizado com ScoutReport real (refined_niche, suggested_segment, pontuação), botões presentes. Durante esse teste real, 3 bugs de produção NÃO relacionados ao Epic 22 foram descobertos e corrigidos com autorização direta do usuário (ver nota abaixo) — o teste manual acabou tendo valor adicional além do escopo original da story.'
    suggested_action: 'Nenhuma — validado. Registrar como aprendizado: o teste manual real revelou problemas de infraestrutura/integração que testes unitários (mesmo se existissem) não pegariam — reforça o valor de pelo menos um passe manual em produção para stories que tocam fluxos de autenticação/redirect.'
    suggested_owner: po

  - id: 'UX-001'
    severity: medium
    finding: 'O Completion Notes do @dev justificava dispensar o card de sugestão mesmo em caso de FALHA ao aceitar, alegando que "o usuário pode ajustar o segmento depois nas configurações" — mas não existe nenhuma tela de configurações que edite segment neste frontend (confirmado: grep por "segment" em frontend/app não retorna nada). Isso deixava o usuário sem feedback de erro e sem forma de tentar de novo.'
    suggested_action: 'CORRIGIDO NESTE REVIEW: em caso de falha, exibe toast de erro (reusando o useToast já usado em page.tsx) e MANTÉM o card visível para permitir nova tentativa, em vez de dispensar silenciosamente.'
    suggested_owner: qa

  - id: 'COPY-001'
    severity: low
    finding: 'Quando refined_niche está presente, faltava pontuação entre o nicho e a frase seguinte ("...móveis planejados sob medida Quer usar esse segmento...") — sem separador entre as duas ideias.'
    suggested_action: 'CORRIGIDO NESTE REVIEW: nicho agora vem entre parênteses com ponto final antes da próxima frase.'
    suggested_owner: qa

  - id: 'DOC-002'
    severity: low
    finding: 'AC2 diz literalmente que o indicador aparece para scout_status "running"/"pending", mas a implementação (decisão correta do próprio @dev, encontrada em autorevisão) só mostra para "running" — "pending" é o default do banco para QUALQUER cliente, inclusive quem nunca conectou o Instagram, então mostrá-lo ali seria enganoso. A decisão está certa; o texto do AC ficou desatualizado. Mesma família dos itens DOC-001 (22.1), DES-001 (22.2), DES-002 (22.3), DES-003 (22.4) — todos pendentes de uma passagem consolidada do @po.'
    suggested_action: 'Ajustar o texto do AC2 para refletir o comportamento real, junto com os demais itens DOC/DES pendentes do epic.'
    suggested_owner: po

