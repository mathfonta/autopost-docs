schema: 1
story: '22.2'
story_title: 'Agente Scout — síntese de perfil (visão + texto → ScoutReport)'
gate: PASS
status_reason: 'Todos os AC1-AC8 implementados e testados. Um problema real de robustez foi encontrado (exceção do PIL não capturada em imagem >4MB corrompida) e corrigido pelo QA no próprio ciclo de review, com teste de regressão dedicado. 328/328 na suíte completa.'
reviewer: 'Quinn (Test Architect)'
updated: '2026-07-23T09:15:00-03:00'

top_issues:
  - id: 'REL-001'
    severity: medium
    finding: '_compress_image_for_claude() (reusada de analyst.py) chama PIL Image.open() para imagens acima de 4MB, o que pode levantar exceção (imagem corrompida/truncada, resposta HTTP 200 com corpo inválido). Essa chamada, dentro de _analyze_visual_sample, estava fora de qualquer try/except — a única lacuna de robustez em um arquivo que é rigorosamente defensivo em todo o resto. Uma exceção aqui propagaria por analyze_profile() sem ser capturada, violando a garantia da própria AC7.'
    suggested_action: 'CORRIGIDO NESTE REVIEW: chamada envolvida em try/except por imagem, seguindo o mesmo padrão já usado em _download_image (pula a imagem com falha, não aborta o lote). Teste de regressão adicionado (test_analyze_profile_image_processing_failure_does_not_raise).'
    suggested_owner: qa

  - id: 'DES-001'
    severity: low
    finding: 'AC7 diz literalmente "falha de qualquer modelo → retorna None". A implementação trata falha da etapa de visão como degradação parcial (síntese segue só com texto) em vez de abortar tudo — só falha na síntese final retorna None. Interpretação documentada e defensável (mantém o Scout útil mesmo com uma etapa fora do ar), mas diverge da leitura mais literal do AC.'
    suggested_action: 'Confirmar com @po se essa interpretação está alinhada com a intenção do epic, e ajustar o texto do AC7 para refletir o comportamento real (assim como o DOC-001 da Story 22.1).'
    suggested_owner: po

  - id: 'PERF-001'
    severity: low
    finding: 'Download das até 6 imagens da amostra visual é sequencial (um await por vez), não paralelo. Timeout de 30s por imagem — pior caso teórico de ~180s se todas falharem por timeout, embora o caminho comum seja rápido.'
    suggested_action: 'Considerar asyncio.gather() para paralelizar os downloads quando o volume de chamadas do Scout em produção justificar a otimização. Não bloqueia — roda em background (Celery, Story 22.3), não no caminho crítico do usuário.'
    suggested_owner: dev

